<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daoer - 在线音频转MP3工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            background-image: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.95)), url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
        }
        .drop-zone-active {
            border-color: #6366f1 !important;
            background-color: #eef2ff !important;
        }
        .feature-card:active { transform: scale(0.97); }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col">

<header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-40 border-b">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
                <i class="fa-solid fa-music text-xs"></i>
            </div>
            <span class="font-bold text-lg text-gray-900">Daoer</span>
        </div>
        <div class="flex items-center gap-2">
            <a href="index.html" class="text-xs text-indigo-600 font-medium px-2 py-1">转换</a>
            <a href="extract.html" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1">
                <i class="fa-solid fa-film"></i> 提取器
            </a>
        </div>
    </div>
</header>

<main class="flex-grow px-4 py-8 w-full">
  <div class="max-w-4xl mx-auto">

    <!-- 标题 -->
    <div class="text-center mb-6">
        <h1 class="text-2xl md:text-4xl font-extrabold text-gray-900 mb-1">
            将任何音频转换为 <span class="text-indigo-600">MP3</span>
        </h1>
        <p class="text-sm text-gray-500">支持 WAV, FLAC, AAC, M4A 等格式，快速、免费转换。</p>
    </div>

    <!-- 上传区域 + 设置 -->
    <div class="bg-white rounded-2xl shadow-lg p-5 mb-5">
        <div class="md:flex md:gap-6">
            <div class="flex-1 mb-4 md:mb-0">
                <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center cursor-pointer transition-all">
                    <div class="w-14 h-14 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
                    </div>
                    <h3 class="text-base font-semibold text-gray-800 mb-1">点击或拖拽文件到此处</h3>
                    <p class="text-gray-400 text-xs mb-4">支持批量上传，单个文件最大 200MB</p>
                    <button class="bg-indigo-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium">选择文件</button>
                    <input type="file" id="file-input" class="hidden" multiple accept=".mp3,.wav,.flac,.aac,.m4a,.ogg">
                </div>
            </div>
            <div class="md:w-48 space-y-3">
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">比特率 (kbps)</label>
                    <select id="bitrate" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm">
                        <option value="128">128 kbps</option>
                        <option value="192">192 kbps</option>
                        <option value="320">320 kbps</option>
                        <option value="64">64 kbps</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">采样率 (Hz)</label>
                    <select id="sampleRate" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm">
                        <option value="44100">44100 Hz</option>
                        <option value="48000">48000 Hz</option>
                        <option value="22050">22050 Hz</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- 文件列表 -->
    <div id="file-list" class="hidden bg-white rounded-2xl shadow-lg p-5 mb-5">
        <h3 class="text-sm font-semibold text-gray-800 mb-3 flex items-center gap-2">
            <i class="fa-solid fa-list text-indigo-600"></i>待转换文件
            <span id="file-count" class="text-gray-400 text-xs"></span>
        </h3>
        <div id="file-items" class="space-y-2 max-h-64 overflow-y-auto"></div>
    </div>

    <!-- 功能特点 -->
    <div class="grid grid-cols-3 gap-3 mb-6">
        <div class="bg-white rounded-xl p-3 text-center shadow-sm">
            <i class="fa-solid fa-bolt text-indigo-500 text-lg mb-1"></i>
            <p class="text-xs font-medium text-gray-700">极速转换</p>
        </div>
        <div class="bg-white rounded-xl p-3 text-center shadow-sm">
            <i class="fa-solid fa-shield-halved text-indigo-500 text-lg mb-1"></i>
            <p class="text-xs font-medium text-gray-700">安全隐私</p>
        </div>
        <div class="bg-white rounded-xl p-3 text-center shadow-sm">
            <i class="fa-solid fa-sliders text-indigo-500 text-lg mb-1"></i>
            <p class="text-xs font-medium text-gray-700">高度自定义</p>
        </div>
    </div>

  </div>
</main>

    <!-- 文件列表 -->
    <div id="file-list" class="hidden bg-white rounded-2xl shadow-lg p-5 mb-5">
        <h3 class="text-sm font-semibold text-gray-800 mb-3 flex items-center gap-2">
            <i class="fa-solid fa-list text-indigo-600"></i>待转换文件
            <span id="file-count" class="text-gray-400 text-xs"></span>
        </h3>
        <div id="file-items" class="space-y-2 max-h-64 overflow-y-auto"></div>
    </div>
</main>

<footer class="text-center text-gray-400 text-xs py-4 border-t bg-white/50">
    &copy; 2026 Daoer Audio Tools. All rights reserved.
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
<script>
    let filesToProcess = [];

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileListDiv = document.getElementById('file-list');
    const fileItemsContainer = document.getElementById('file-items');
    const fileCountSpan = document.getElementById('file-count');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drop-zone-active'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drop-zone-active'));
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('drop-zone-active'); handleFiles(e.dataTransfer.files); });
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
        const MAX_SIZE = 200 * 1024 * 1024;
        const validFiles = [];
        for (let file of files) {
            if (file.size > MAX_SIZE) alert(`${file.name} 超过200MB限制`);
            else if (!file.type.startsWith('audio/') && !file.name.match(/\.(mp3|wav|flac|aac|m4a|ogg)$/i)) alert(`${file.name} 不是支持的音频文件`);
            else validFiles.push(file);
        }
        if (validFiles.length) { filesToProcess.push(...validFiles); updateFileList(); }
    }

    function updateFileList() {
        if (!filesToProcess.length) { fileListDiv.classList.add('hidden'); return; }
        fileListDiv.classList.remove('hidden');
        fileCountSpan.textContent = `(${filesToProcess.length}个)`;
        fileItemsContainer.innerHTML = '';
        filesToProcess.forEach((file, i) => {
            const div = document.createElement('div');
            div.className = 'p-3 bg-gray-50 rounded-lg border flex items-center justify-between';
            div.innerHTML = `
                <div class="flex items-center gap-2 flex-1 min-w-0">
                    <i class="fa-solid fa-file-audio text-indigo-600 text-sm"></i>
                    <span class="text-xs truncate flex-1">${file.name.replace(/[&<>]/g, '')}</span>
                    <span class="text-xs text-gray-400">${formatSize(file.size)}</span>
                </div>
                <button onclick="removeFile(${i})" class="text-red-400 ml-2"><i class="fa-solid fa-xmark"></i></button>
            `;
            fileItemsContainer.appendChild(div);
        });
        if (!document.getElementById('convert-btn')) {
            const btn = document.createElement('button');
            btn.id = 'convert-btn';
            btn.className = 'w-full mt-3 bg-indigo-600 text-white py-3 rounded-lg text-sm font-medium';
            btn.textContent = '开始转换';
            btn.onclick = startConversion;
            fileItemsContainer.appendChild(btn);
        }
    }

    function formatSize(bytes) {
        if (!bytes) return '0 B';
        const k=1024, sizes=['B','KB','MB'];
        const i=Math.floor(Math.log(bytes)/Math.log(k));
        return parseFloat((bytes/Math.pow(k,i)).toFixed(1))+' '+sizes[i];
    }

    function removeFile(idx) { filesToProcess.splice(idx,1); updateFileList(); }

    async function startConversion() {
        if (!filesToProcess.length) return;
        const btn = document.getElementById('convert-btn');
        btn.disabled = true; btn.textContent = '转换中...';
        for (let i = 0; i < filesToProcess.length; i++) {
            await convertToMp3(filesToProcess[i], i);
        }
        btn.disabled = false; btn.textContent = '开始转换';
        alert('转换完成！');
    }

    async function convertToMp3(file, idx) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const audioBuffer = await audioCtx.decodeAudioData(e.target.result);
                    const targetSr = parseInt(document.getElementById('sampleRate').value);
                    const bitrate = parseInt(document.getElementById('bitrate').value);
                    let buffer = audioBuffer;
                    if (audioBuffer.sampleRate !== targetSr) {
                        const ratio = targetSr / audioBuffer.sampleRate;
                        const newLen = Math.floor(audioBuffer.length * ratio);
                        const offlineCtx = new OfflineAudioContext(audioBuffer.numberOfChannels, newLen, targetSr);
                        const src = offlineCtx.createBufferSource();
                        src.buffer = audioBuffer;
                        src.connect(offlineCtx.destination);
                        src.start();
                        buffer = await offlineCtx.startRendering();
                    }
                    const samples = new Int16Array(buffer.length * buffer.numberOfChannels);
                    for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
                        const data = buffer.getChannelData(ch);
                        for (let i = 0; i < buffer.length; i++) {
                            const s = Math.max(-1, Math.min(1, data[i]));
                            samples[i * buffer.numberOfChannels + ch] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                        }
                    }
                    const encoder = new lamejs.Mp3Encoder(buffer.numberOfChannels, buffer.sampleRate, bitrate);
                    const mp3 = [];
                    const blockSize = 1152;
                    for (let i = 0; i < samples.length; i += blockSize) {
                        const chunk = samples.subarray(i, i + blockSize);
                        const mp3buf = encoder.encodeBuffer(chunk);
                        if (mp3buf.length > 0) mp3.push(mp3buf);
                    }
                    const end = encoder.flush();
                    if (end.length > 0) mp3.push(end);
                    const blob = new Blob(mp3, { type: 'audio/mp3' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = file.name.replace(/\.[^/.]+$/, '.mp3');
                    a.click();
                    URL.revokeObjectURL(url);
                    resolve();
                } catch(err) { console.error(err); resolve(); }
            };
            reader.readAsArrayBuffer(file);
        });
    }
</script>
</body>
</html>
