<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Daoer · 音频提取器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      background-image: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.95)), url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=1920&auto=format&fit=crop');
      background-size: cover;
      background-attachment: fixed;
    }
    .drop-glow.active {
      border-color: #4f46e5 !important;
      background-color: #eef2ff !important;
    }
    button:disabled { opacity: 0.6; }
    audio { border-radius: 12px; background: #f9fafb; width: 100%; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

<header class="bg-white/90 backdrop-blur-md border-b sticky top-0 z-30">
  <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <div class="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
        <i class="fa-solid fa-headphones text-xs"></i>
      </div>
      <span class="font-bold text-lg text-gray-800">Daoer<span class="text-indigo-600">提取器</span></span>
    </a>
    <a href="index.html" class="text-xs text-gray-500 flex items-center gap-1">
      <i class="fa-solid fa-rotate"></i> 格式转换
    </a>
  </div>
</header>

<main class="flex-grow px-4 py-6 max-w-6xl mx-auto w-full">
  <div class="text-center mb-6">
    <h1 class="text-2xl md:text-4xl font-extrabold text-gray-900 mb-1">
      视频 <span class="text-indigo-600">提取音频</span>
    </h1>
    <p class="text-sm text-gray-500">上传视频 · 提取音频 · 在线播放</p>
  </div>

  <div class="bg-white rounded-2xl shadow-lg p-5 mb-6">
    <div id="dropZone" class="border-2 border-dashed border-gray-200 rounded-xl p-6 text-center cursor-pointer drop-glow transition-all">
      <div class="w-14 h-14 bg-indigo-50 text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-3">
        <i class="fa-solid fa-film text-xl"></i>
      </div>
      <h3 class="text-base font-semibold text-gray-700 mb-1">点击或拖拽视频文件</h3>
      <p class="text-gray-400 text-xs mb-4">MP4, WebM, MOV 等 · 最大 200MB</p>
      <button id="selectBtn" class="bg-indigo-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium">
        <i class="fa-solid fa-folder-open mr-1.5"></i>选择视频
      </button>
      <input type="file" id="fileInput" class="hidden" accept="video/*,.mp4,.webm,.mov,.avi,.mkv">
    </div>

    <div id="fileInfo" class="hidden mt-4 bg-gray-50 rounded-xl p-3 border">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2 min-w-0">
          <i class="fa-solid fa-video text-indigo-600 text-sm"></i>
          <p id="fileName" class="text-xs font-medium text-gray-800 truncate"></p>
          <span id="fileSize" class="text-xs text-gray-400"></span>
        </div>
        <button id="clearFileBtn" class="text-gray-400 hover:text-red-500 p-1"><i class="fa-solid fa-trash-can text-sm"></i></button>
      </div>
      <div id="progressArea" class="hidden mt-3">
        <div class="flex justify-between text-xs text-gray-500 mb-1">
          <span id="progressText">准备中...</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-1.5">
          <div id="progressFill" class="bg-indigo-600 h-1.5 rounded-full transition-all" style="width:0%"></div>
        </div>
      </div>
    </div>

    <button id="extractBtn" class="hidden w-full mt-4 bg-indigo-600 text-white py-3 rounded-xl text-sm font-medium">
      <i class="fa-solid fa-music mr-1.5"></i>提取音频
    </button>

    <div id="playerArea" class="hidden mt-4 bg-indigo-50 rounded-xl p-4">
      <div class="flex items-center gap-2 mb-2">
        <i class="fa-solid fa-headphones text-indigo-600 text-sm"></i>
        <span class="text-xs font-medium text-gray-700">在线播放</span>
        <span id="audioDuration" class="text-xs text-gray-400 ml-auto"></span>
      </div>
      <audio id="audioPlayer" controls preload="auto"></audio>
      <div class="flex gap-2 mt-3">
        <button id="downloadBtn" class="flex-1 bg-indigo-600 text-white py-2.5 rounded-lg text-xs font-medium">
          <i class="fa-solid fa-download mr-1"></i>下载
        </button>
        <button id="extractAgainBtn" class="px-4 py-2.5 border border-gray-200 text-gray-600 rounded-lg text-xs">
          <i class="fa-solid fa-rotate-right"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-3 gap-3 text-center mb-6">
    <div class="bg-white/80 p-3 rounded-xl border"><i class="fa-solid fa-bolt text-indigo-500 text-lg mb-1"></i><p class="text-xs text-gray-600">快速提取</p></div>
    <div class="bg-white/80 p-3 rounded-xl border"><i class="fa-solid fa-lock text-indigo-500 text-lg mb-1"></i><p class="text-xs text-gray-600">隐私安全</p></div>
    <div class="bg-white/80 p-3 rounded-xl border"><i class="fa-solid fa-file-audio text-indigo-500 text-lg mb-1"></i><p class="text-xs text-gray-600">WAV 无损</p></div>
  </div>
</main>

<footer class="text-center text-gray-400 text-xs py-4 border-t bg-white/50">
  Daoer · 浏览器本地处理
</footer>

<script>
(function() {
  const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),
    selectBtn=document.getElementById('selectBtn'),fileInfo=document.getElementById('fileInfo'),
    fileName=document.getElementById('fileName'),fileSize=document.getElementById('fileSize'),
    clearFileBtn=document.getElementById('clearFileBtn'),extractBtn=document.getElementById('extractBtn'),
    progressArea=document.getElementById('progressArea'),progressFill=document.getElementById('progressFill'),
    progressText=document.getElementById('progressText'),progressPercent=document.getElementById('progressPercent'),
    playerArea=document.getElementById('playerArea'),audioPlayer=document.getElementById('audioPlayer'),
    audioDuration=document.getElementById('audioDuration'),downloadBtn=document.getElementById('downloadBtn'),
    extractAgainBtn=document.getElementById('extractAgainBtn');

  let selectedFile=null,extractedBlob=null,extractedName='audio.wav',audioUrl=null;

  function reset() {
    selectedFile=null;extractedBlob=null;extractedName='audio.wav';
    fileInput.value='';fileInfo.classList.add('hidden');extractBtn.classList.add('hidden');
    progressArea.classList.add('hidden');playerArea.classList.add('hidden');
    progressFill.style.width='0%';progressPercent.textContent='0%';progressText.textContent='准备中...';
    if(audioUrl){URL.revokeObjectURL(audioUrl);audioUrl=null;}audioPlayer.src='';
  }

  function setupPlayer(blob) {
    if(audioUrl)URL.revokeObjectURL(audioUrl);
    audioUrl=URL.createObjectURL(blob);audioPlayer.src=audioUrl;audioPlayer.load();
    audioPlayer.addEventListener('loadedmetadata',()=>{
      const d=audioPlayer.duration;
      if(d&&!isNaN(d))audioDuration.textContent=`${Math.floor(d/60)}:${String(Math.floor(d%60)).padStart(2,'0')}`;
    },{once:true});
    playerArea.classList.remove('hidden');
  }

  function formatSize(b) {
    if(!b)return'0 B';const k=1024,s=['B','KB','MB'];
    const i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i];
  }

  function displayFile(f) {
    selectedFile=f;fileName.textContent=f.name;fileSize.textContent=formatSize(f.size);
    fileInfo.classList.remove('hidden');extractBtn.classList.remove('hidden');
    progressArea.classList.add('hidden');playerArea.classList.add('hidden');
    extractedBlob=null;if(audioUrl){URL.revokeObjectURL(audioUrl);audioUrl=null;}audioPlayer.src='';
  }

  function handleFile(f) {
    if(!f)return;
    const ext=f.name.split('.').pop()?.toLowerCase();
    if(!f.type.startsWith('video/')&&!['mp4','webm','mov','avi','mkv'].includes(ext)){alert('请选择视频文件');return;}
    if(f.size>200*1024*1024){alert('文件过大');return;}
    reset();displayFile(f);
  }

  selectBtn.addEventListener('click',e=>{e.stopPropagation();fileInput.click();});
  dropZone.addEventListener('click',()=>fileInput.click());
  fileInput.addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});
  dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('active');});
  dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('active'));
  dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('active');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
  clearFileBtn.addEventListener('click',reset);

  extractBtn.addEventListener('click', async()=>{
    if(!selectedFile)return;
    
    // 手机端大文件提示
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if(isMobile && selectedFile.size > 50 * 1024 * 1024){
      if(!confirm(`文件较大(${formatSize(selectedFile.size)})，手机端可能处理较慢或失败。\n\n建议使用电脑端操作。\n\n是否继续？`)){
        return;
      }
    }
    
    extractBtn.disabled=true;
    extractBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1.5"></i>处理中...';
    progressArea.classList.remove('hidden');
    playerArea.classList.add('hidden');
    progressFill.style.width='0%';
    progressPercent.textContent='0%';
    progressText.textContent='读取中...';
    
    try{
      const buf=await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=e=>res(e.target.result);
        r.onerror=()=>rej(new Error('读取失败'));
        r.readAsArrayBuffer(selectedFile);
      });
      
      progressFill.style.width='30%';
      progressPercent.textContent='30%';
      progressText.textContent='解码中...';
      
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('解码超时，请尝试较小的视频文件')),60000));
      const audio=await Promise.race([ctx.decodeAudioData(buf),timeout]);
      
      progressFill.style.width='60%';
      progressPercent.textContent='60%';
      progressText.textContent='处理中...';
      
      const wav=audioBufferToWav(audio);
      
      progressFill.style.width='100%';
      progressPercent.textContent='100%';
      progressText.textContent='完成!';
      
      extractedBlob=wav;
      extractedName=selectedFile.name.replace(/\.[^/.]+$/,'')+'_audio.wav';
      setupPlayer(wav);
    }catch(e){
      console.error(e);
      alert('提取失败：' + (e.message || '视频可能过大或格式不支持'));
      progressText.textContent='失败';
      progressFill.style.width='0%';
    }
    finally{
      extractBtn.disabled=false;
      extractBtn.innerHTML = '<i class="fa-solid fa-music mr-1.5"></i>提取音频';
    }
  });

  function audioBufferToWav(b) {
    const ch=b.numberOfChannels,sr=b.sampleRate,len=b.getChannelData(0).length;
    let interleaved;
    if(ch===2){interleaved=new Float32Array(len*2);for(let i=0;i<len;i++){interleaved[i*2]=b.getChannelData(0)[i];interleaved[i*2+1]=b.getChannelData(1)[i];}}
    else interleaved=b.getChannelData(0);
    const dl=interleaved.length*2,buf=new ArrayBuffer(44+dl),v=new DataView(buf);
    const w=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
    w(0,'RIFF');v.setUint32(4,36+dl,true);w(8,'WAVE');w(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);
    v.setUint16(22,ch,true);v.setUint32(24,sr,true);v.setUint32(28,sr*ch*2,true);v.setUint16(32,ch*2,true);
    v.setUint16(34,16,true);w(36,'data');v.setUint32(40,dl,true);
    let off=44;for(let i=0;i<interleaved.length;i++){const s=Math.max(-1,Math.min(1,interleaved[i]));v.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);off+=2;}
    return new Blob([buf],{type:'audio/wav'});
  }

  downloadBtn.addEventListener('click',()=>{if(extractedBlob){const u=URL.createObjectURL(extractedBlob);const a=document.createElement('a');a.href=u;a.download=extractedName;a.click();URL.revokeObjectURL(u);}});
  extractAgainBtn.addEventListener('click',()=>{if(selectedFile){extractedBlob=null;if(audioUrl){URL.revokeObjectURL(audioUrl);audioUrl=null;}audioPlayer.src='';playerArea.classList.add('hidden');extractBtn.click();}});
  reset();
})();
</script>
</body>
</html>
